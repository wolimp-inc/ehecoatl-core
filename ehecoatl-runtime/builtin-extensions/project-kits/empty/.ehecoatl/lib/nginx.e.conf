limit_req_zone $binary_remote_addr zone=@t(limit_req_zone_name):@t(limit_req_zone_size) rate=@t(limit_req_rate);
limit_conn_zone $binary_remote_addr zone=@t(limit_conn_zone_name):@t(limit_conn_zone_size);

server {
    listen 80;
    server_name @t(hostname) @t(hostname_www);

    access_log @t(access_log_path);
    error_log @t(error_log_path);

    location ^~ /_ehecoatl_internal/static/ {
        internal;
        alias @t(tenant_root)/;
    }

    location ^~ /_ehecoatl_internal/cache/ {
        internal;
        alias @t(cache_root)/;
    }

    location = @t(ws_path_prefix) {
        proxy_pass http://{{WS_UPSTREAM_HOST}}:{{WS_UPSTREAM_PORT}};
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_request_buffering off;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Method $request_method;
        proxy_set_header X-Forwarded-Uri $uri;
        proxy_set_header X-Forwarded-Query $args;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location ^~ @t(ws_path_prefix)/ {
        proxy_pass http://{{WS_UPSTREAM_HOST}}:{{WS_UPSTREAM_PORT}};
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_request_buffering off;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Method $request_method;
        proxy_set_header X-Forwarded-Uri $uri;
        proxy_set_header X-Forwarded-Query $args;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location ~ ^(.+?)/+$ {
        return 308 $scheme://$host$1$is_args$args;
    }

    location / {
        proxy_pass http://{{HTTP_UPSTREAM_HOST}}:{{HTTP_UPSTREAM_PORT}};
        proxy_http_version 1.1;
        proxy_buffering on;
        proxy_request_buffering on;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Method $request_method;
        proxy_set_header X-Forwarded-Uri $uri;
        proxy_set_header X-Forwarded-Query $args;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}

server {
    listen 443 ssl http2;
    server_name @t(hostname) @t(hostname_www);

    ssl_certificate @t(tls_cert_path);
    ssl_certificate_key @t(tls_key_path);

    access_log @t(access_log_path);
    error_log @t(error_log_path);

    location / {
        proxy_pass http://{{HTTP_UPSTREAM_HOST}}:{{HTTP_UPSTREAM_PORT}};
        proxy_http_version 1.1;
        proxy_buffering on;
        proxy_request_buffering on;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Method $request_method;
        proxy_set_header X-Forwarded-Uri $uri;
        proxy_set_header X-Forwarded-Query $args;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
